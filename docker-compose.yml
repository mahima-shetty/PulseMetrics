services:
  postgres:
    image: postgres:15-alpine
    container_name: founderdashboard_db
    environment:
      POSTGRES_USER: founder
      POSTGRES_PASSWORD: founder_secret
      POSTGRES_DB: founderdashboard
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U founder -d founderdashboard"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: founderdashboard_backend
    environment:
      DATABASE_URL: postgresql://founder:founder_secret@postgres:5432/founderdashboard
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-your-super-secret-key-change-in-production}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-llama-3.1-8b-instant}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
